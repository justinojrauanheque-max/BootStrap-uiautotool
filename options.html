<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body>
    <div class="acfh-skeleton-overlay acfh-loading-overlay"></div>
    
    <script>
    // bootstrap.js - Loads public assets from the Supabase web bucket and injects full page
    (function () {
      'use strict';

      var SUPABASE_BASE = 'https://bfjhgisfzdsefjjojbov.supabase.co/storage/v1/object/public/web';
      window.ACFH_SUPABASE_BASE = SUPABASE_BASE;

      // Carrega CSS em paralelo
      function loadCss(href) {
        return new Promise(function(resolve) {
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = href;
          l.onload = function() { resolve(true); };
          l.onerror = function() { resolve(false); };
          setTimeout(function() { resolve(false); }, 5000);
          document.head.appendChild(l);
        });
      }

      // Carrega Script sequencialmente
      function loadScript(url) {
        return new Promise(function(resolve) {
          var s = document.createElement('script');
          s.src = url;
          s.async = false;
          s.onload = function() { resolve(true); };
          s.onerror = function() { resolve(false); };
          setTimeout(function() { resolve(false); }, 7000);
          document.body.appendChild(s);
        });
      }

      var cssFiles = ['options.css'];
      var scriptFiles = [
        'acfh-i18n.js',
        'lib/codemirror/codemirror.js',
        'lib/codemirror/mode/javascript/javascript.js',
        'lib/codemirror/addon/edit/matchbrackets.js',
        'navbar.js',
        'index-processing.js',
        'settings-processing.js',
        'options.js'
      ];

      // Carrega CSS (paralelo)
      cssFiles.forEach(function(name) {
        var url = SUPABASE_BASE + '/' + encodeURIComponent(name);
        loadCss(url);
      });

      // Carrega Scripts sequencialmente depois carrega HTML
      (function loadAllScripts(index) {
        if (index >= scriptFiles.length) {
          // Todos os scripts carregados, agora carrega a HTML
          loadPageContent();
          return;
        }
        var name = scriptFiles[index];
        var url = SUPABASE_BASE + '/' + encodeURIComponent(name);
        loadScript(url).then(function() {
          loadAllScripts(index + 1);
        });
      })(0);

      function loadPageContent() {
        try {
          var overlay = document.querySelector('.acfh-skeleton-overlay');
          if (overlay) {
            overlay.classList.remove('acfh-loading-overlay');
            overlay.style.display = 'none';
          }
        } catch (e) { }

        // Fetch a página HTML completa do Supabase
        var xhr = new XMLHttpRequest();
        xhr.open('GET', SUPABASE_BASE + '/options.html', true);
        xhr.onload = function() {
          if (xhr.status === 200) {
            try {
              var parser = new DOMParser();
              var doc = parser.parseFromString(xhr.responseText, 'text/html');
              
              // Substitui o body
              document.body.innerHTML = doc.body.innerHTML;
              
              // Adiciona styles do head
              var headStyles = doc.head.querySelectorAll('link[rel="stylesheet"], style');
              headStyles.forEach(function(s) { 
                document.head.appendChild(document.importNode(s, true)); 
              });
              
              // Carrega e executa scripts inline do documento
              var bodyScripts = doc.body.querySelectorAll('script');
              bodyScripts.forEach(function(s, idx) {
                var newScript = document.createElement('script');
                if (s.src) {
                  newScript.src = s.src;
                } else {
                  newScript.textContent = s.textContent;
                }
                newScript.async = false;
                document.body.appendChild(newScript);
              });
            } catch (e) {
              console.error('Erro ao processar página:', e);
            }
          }
        };
        xhr.onerror = function() {
          console.error('Erro ao carregar página HTML');
        };
        xhr.send();

        try { window.dispatchEvent(new Event('acfh:bootstrap:loaded')); } catch (e) {}
      }
    })();
    </script>
</body>
</html>
