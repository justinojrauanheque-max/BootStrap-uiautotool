<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body>
    <div class="acfh-skeleton-overlay acfh-loading-overlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="text-align: center; font-family: system-ui, -apple-system, sans-serif;">
            <h2>Loading Settings...</h2>
            <p>Fetching resources from Supabase</p>
        </div>
    </div>
    
    <script>
    (function() {
        'use strict';
        
        // Definir base URL global
        window.ACFH_SUPABASE_BASE = 'https://bfjhgisfzdsefjjojbov.supabase.co/storage/v1/object/public/web';
        
        console.log('[ACFH] Options Bootstrap iniciado');
        console.log('[ACFH] Verificando se os recursos estão sendo servidos via Vercel');
        
        // Aguardar um pouco para os scripts carregarem via rewrites do Vercel
        var checkCount = 0;
        var checkInterval = setInterval(function() {
            checkCount++;
            
            // Verificar se os scripts globais existem
            if (window.ACFH_I18N || window.CodeMirror) {
                clearInterval(checkInterval);
                console.log('[ACFH] ✓ Scripts detectados! Limpando overlay...');
                hideOverlay();
            } else if (checkCount > 50) {
                clearInterval(checkInterval);
                console.warn('[ACFH] Timeout aguardando scripts, mas continuando...');
                hideOverlay();
            }
        }, 100);
        
        function hideOverlay() {
            var overlay = document.querySelector('.acfh-skeleton-overlay');
            if (overlay) {
                overlay.style.display = 'none';
            }
        }
        
        // Dispara evento quando estiver pronto
        setTimeout(function() {
            try {
                window.dispatchEvent(new Event('acfh:bootstrap:loaded'));
                console.log('[ACFH] ✓ Event acfh:bootstrap:loaded disparado');
            } catch(e) {}
        }, 1000);
    })();
    </script>
</body>
</html>
